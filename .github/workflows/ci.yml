name: Churn Risk API - CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0" # Weekly retraining (Sunday)

jobs:
  # =========================
  # 1. TEST JOB
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # =========================
  # 2. TRAIN MODEL
  # =========================
  train-and-track:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: |
          pip install kaggle
          kaggle datasets download -d blastchar/telco-customer-churn -p ml/data --unzip
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      - name: Train and track model
        run: python -m mlops.experiment_tracking

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: ml/models/model.pkl

  # =========================
  # 3. BUILD & VERIFY DOCKER
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: train-and-track

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔥 CRITICAL: Download trained model
      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ml/models

      - name: Verify model exists
        run: ls -R ml/models

      - name: Build Docker image
        run: docker build -t churn-risk-api-2022bcs0042 .

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name churn-risk-api churn-risk-api-2022bcs0042

      # ⏳ Wait for API to start
      - name: Wait for container
        run: sleep 10

      # 🔍 DEBUG LOGS (VERY IMPORTANT)
      - name: Check container logs
        run: docker logs churn-risk-api

      # ✅ HEALTH CHECK
      - name: Test API health
        run: curl http://localhost:8000/health

  # =========================
  # 4. RETRAIN (SCHEDULED ONLY)
  # =========================
  retrain:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: |
          pip install kaggle
          kaggle datasets download -d blastchar/telco-customer-churn -p ml/data --unzip
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

      - name: Run retraining pipeline
        run: python -m mlops.retraining.retrain
